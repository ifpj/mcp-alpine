name: Build and Release

on:
  push:
    branches: ["main", "master"]
    tags: ['v*']
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cross -y

      - name: Build
        run: cross build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C embed-bitcode=yes -C strip=symbols -C opt-level=z -C lto=true -C panic=abort -C codegen-units=1"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-alpine-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/mcp-alpine
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Download x86_64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: mcp-alpine-x86_64-unknown-linux-musl
          path: artifacts/x86_64

      - name: Download aarch64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: mcp-alpine-aarch64-unknown-linux-musl
          path: artifacts/aarch64

      - name: Prepare Release Files
        run: |
          mkdir release_assets
          cp artifacts/x86_64/mcp-alpine release_assets/mcp-alpine-linux-amd64
          cp artifacts/aarch64/mcp-alpine release_assets/mcp-alpine-linux-arm64
          chmod +x release_assets/*
          cd release_assets && tar -czf ../mcp-alpine-linux-amd64.tar.gz mcp-alpine-linux-amd64 && tar -czf ../mcp-alpine-linux-arm64.tar.gz mcp-alpine-linux-arm64

      - name: Create sha release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sha-${{ steps.slug.outputs.sha8 }}
          name: "Release ${{ steps.slug.outputs.sha8 }}"
          body: "Build for commit ${{ github.sha }} (${{ steps.slug.outputs.sha8 }})"
          prerelease: false
          files: release_assets/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Download x86_64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: mcp-alpine-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release

      - name: Download aarch64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: mcp-alpine-aarch64-unknown-linux-musl
          path: target/aarch64-unknown-linux-musl/release

      - name: Fix executable permissions
        run: |
          chmod +x target/x86_64-unknown-linux-musl/release/mcp-alpine
          chmod +x target/aarch64-unknown-linux-musl/release/mcp-alpine

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.slug.outputs.sha8 }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          platforms: linux/amd64,linux/arm64
